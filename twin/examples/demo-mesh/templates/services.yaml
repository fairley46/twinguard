apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: {{ .Values.servicePorts.frontend }}
    targetPort: {{ .Values.servicePorts.frontend }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: api
  ports:
  - protocol: TCP
    port: {{ .Values.servicePorts.api }}
    targetPort: {{ .Values.servicePorts.api }}
---
apiVersion: v1
kind: Service
metadata:
  name: db
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: db
  ports:
  - protocol: TCP
    port: {{ .Values.servicePorts.db }}
    targetPort: {{ .Values.servicePorts.db }}
